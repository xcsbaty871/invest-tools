name: 🐷 猪肉股每日数据更新

on:
  # 每天早上9点、下午3点（A股交易时段）自动运行
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00
    - cron: '0 7 * * *'   # UTC 07:00 = 北京时间 15:00
  # 也可以手动触发（GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python scrape_pork.py

      - name: 提交数据
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          # 只有有变化才提交
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "📊 自动更新猪肉股数据 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
