<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猪肉股追踪</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0b10; --card: #13141f; --border: #1e2130;
    --text: #e4e6f0; --dim: #6b7094;
    --accent: #6366f1; --green: #22c55e; --red: #ef4444;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    min-height: 100vh; padding: 20px 16px;
  }
  .container { max-width: 900px; margin: 0 auto; }

  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .top-bar h1 {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #ec4899, #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .refresh-info { font-size: 12px; color: var(--dim); }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .sum-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; text-align: center;
  }
  .sum-label { font-size: 11px; color: var(--dim); margin-bottom: 6px; }
  .sum-val { font-size: 20px; font-weight: 700; }
  .up { color: var(--red); } .down { color: var(--green); }

  /* ETF Banner */
  .etf-banner {
    background: linear-gradient(135deg, rgba(236,72,153,0.12), rgba(249,115,22,0.12));
    border: 1px solid rgba(236,72,153,0.2);
    border-radius: 14px; padding: 18px 24px;
    margin-bottom: 20px; display: flex;
    align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .etf-name { font-size: 18px; font-weight: 700; }
  .etf-price { font-size: 28px; font-weight: 800; }
  .etf-tag {
    font-size: 12px; background: rgba(236,72,153,0.15);
    color: #ec4899; padding: 3px 10px; border-radius: 6px;
  }

  /* Table */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .section-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th {
    text-align: left; padding: 8px 10px;
    color: var(--dim); font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; border-bottom: 1px solid var(--border);
  }
  .tbl td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .tbl tr:hover td { background: rgba(99,102,241,0.04); }
  .tbl tr:last-child td { border-bottom: none; }
  .up-text { color: var(--red); font-weight: 600; }
  .down-text { color: var(--green); font-weight: 600; }
  .neutral-text { color: var(--dim); }
  .pe { color: var(--dim); font-size: 12px; }
  .update-time { font-size: 12px; color: var(--dim); margin-top: 14px; text-align: right; }

  .note {
    font-size: 12px; color: var(--dim); background: rgba(255,255,255,0.02);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; margin-top: 12px;
  }

  @media (max-width: 600px) {
    .tbl { font-size: 12px; }
    .tbl th, .tbl td { padding: 8px 6px; }
    .sum-card { min-width: 80px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div>
      <h1>🐷 猪肉股追踪</h1>
      <div style="font-size:13px;color:var(--dim);margin-top:4px">A股猪肉产业链 · 实时行情</div>
    </div>
    <div class="refresh-info" id="updateTime">数据更新时间: —</div>
  </div>

  <!-- ETF Banner -->
  <div class="etf-banner" id="etfBanner">
    <div>
      <div class="etf-tag">板块ETF</div>
      <div class="etf-name" id="etfName">畜牧ETF (516670)</div>
    </div>
    <div style="text-align:right">
      <div class="etf-price" id="etfPrice">—</div>
      <div id="etfChange">—</div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- Stock Table -->
  <div class="section">
    <div class="section-title">📋 个股行情</div>
    <div class="tbl" id="stockTable">
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>最新价</th>
            <th>涨跌幅</th>
            <th>涨跌额</th>
            <th>最高</th>
            <th>最低</th>
            <th>成交额(万)</th>
            <th>PE</th>
          </tr>
        </thead>
        <tbody id="stockBody"></tbody>
      </table>
    </div>
    <div class="update-time" id="tableUpdateTime"></div>
  </div>

  <div class="note">
    💡 数据来源: 东方财富 · 每交易日上午9:00、下午15:00自动更新<br>
    ⚠️ 猪肉价格周期性强，关注能繁母猪存栏量和仔猪价格作为领先指标
  </div>

</div>

<script>
// ── Data (from scrape_pork.py output) ─────────────────────────────────────────
// 实际运行时由 GitHub Actions 爬取更新，此处为示例占位数据
const DATA = {
  "timestamp": "2026-05-06 15:00:00",
  "etf": {
    "code": "516670",
    "name": "畜牧ETF",
    "price": 0.782,
    "change_pct": 1.30,
    "change_amt": 0.010,
    "volume": 8563200,
    "amount": 66941200,
    "high": 0.788,
    "low": 0.771,
    "time": "2026-05-06 15:00:00"
  },
  "stocks": [
    {"code":"002714","name":"牧原股份","price":52.35,"change_pct":2.18,"change_amt":1.12,"high":53.10,"low":51.20,"open":51.50,"prev_close":51.23,"volume":324567,"amount":1692345678,"market_cap":2875,"pe":28.5,"pb":4.2},
    {"code":"300498","name":"温氏股份","price":21.87,"change_pct":1.34,"change_amt":0.29,"high":22.15,"low":21.60,"open":21.65,"prev_close":21.58,"volume":521876,"amount":1142897654,"market_cap":1782,"pe":18.3,"pb":2.8},
    {"code":"000876","name":"新希望","price":9.82,"change_pct":-0.51,"change_amt":-0.05,"high":9.95,"low":9.75,"open":9.88,"prev_close":9.87,"volume":876543,"amount":862145678,"market_cap":438,"pe":32.1,"pb":1.5},
    {"code":"002157","name":"正邦科技","price":3.21,"change_pct":-1.23,"change_amt":-0.04,"high":3.30,"low":3.18,"open":3.25,"prev_close":3.25,"volume":2345678,"amount":753291456,"market_cap":98,"pe":"亏损","pb":0.8},
    {"code":"002124","name":"天邦食品","price":4.56,"change_pct":0.44,"change_amt":0.02,"high":4.62,"low":4.51,"open":4.54,"prev_close":4.54,"volume":456789,"amount":208234567,"market_cap":84,"pe":15.2,"pb":2.1},
    {"code":"603363","name":"傲农生物","price":8.45,"change_pct":-0.82,"change_amt":-0.07,"high":8.60,"low":8.35,"open":8.52,"prev_close":8.52,"volume":345678,"amount":292145678,"market_cap":73,"pe":22.4,"pb":1.9},
    {"code":"001201","name":"东瑞股份","price":24.56,"change_pct":1.28,"change_amt":0.31,"high":24.88,"low":24.20,"open":24.30,"prev_close":24.25,"volume":123456,"amount":302456789,"market_cap":52,"pe":25.8,"pb":2.4},
    {"code":"605507","name":"江苏立华","price":18.92,"change_pct":0.74,"change_amt":0.14,"high":19.15,"low":18.75,"open":18.80,"prev_close":18.78,"volume":234567,"amount":443678901,"market_cap":87,"pe":19.3,"pb":3.1}
  ]
};

// ── Render ─────────────────────────────────────────────────────────────────────
function fmt(v) { return (v || 0).toLocaleString(); }
function fmtP(v) { return v != null ? v.toFixed(2) : '—'; }
function upDown(v) { return v > 0 ? 'up-text' : v < 0 ? 'down-text' : 'neutral-text'; }
function arrow(v) { return v > 0 ? '▲' : v < 0 ? '▼' : '—'; }

// ETF
const etf = DATA.etf;
const etfCls = etf.change_pct > 0 ? 'up' : etf.change_pct < 0 ? 'down' : '';
document.getElementById('etfName').textContent = `畜牧ETF (${etf.code})`;
document.getElementById('etfPrice').textContent = fmtP(etf.price);
document.getElementById('etfPrice').className = 'etf-price ' + etfCls;
document.getElementById('etfChange').innerHTML =
  `<span class="${upDown(etf.change_pct)}">${arrow(etf.change_pct)} ${fmtP(Math.abs(etf.change_pct))}%</span>`;

// Summary
const upCnt = DATA.stocks.filter(s => s.change_pct > 0).length;
const downCnt = DATA.stocks.filter(s => s.change_pct < 0).length;
const avgChange = DATA.stocks.reduce((a, s) => a + s.change_pct, 0) / DATA.stocks.length;

document.getElementById('summaryRow').innerHTML = [
  {label:'上涨', val: upCnt + '只', cls: 'down'},
  {label:'下跌', val: downCnt + '只', cls: 'up'},
  {label:'平均涨跌', val: (avgChange >= 0 ? '+' : '') + avgChange.toFixed(2) + '%', cls: avgChange >= 0 ? 'down' : 'up'},
  {label:'板块温度', val: upCnt > downCnt ? '🔥偏热' : upCnt < downCnt ? '❄️偏冷' : '⚖️中性', cls: ''},
].map(x => `
  <div class="sum-card">
    <div class="sum-label">${x.label}</div>
    <div class="sum-val ${x.cls}">${x.val}</div>
  </div>`).join('');

// Table
const stocks = [...DATA.stocks].sort((a, b) => b.change_pct - a.change_pct);
document.getElementById('stockBody').innerHTML = stocks.map(s => `
  <tr>
    <td><strong>${s.name}</strong><br><span style="font-size:11px;color:var(--dim)">${s.code}</span></td>
    <td><strong>${fmtP(s.price)}</strong></td>
    <td class="${upDown(s.change_pct)}">${arrow(s.change_pct)} ${fmtP(Math.abs(s.change_pct))}%</td>
    <td class="${upDown(s.change_amt)}">${arrow(s.change_amt)} ${fmtP(Math.abs(s.change_amt))}</td>
    <td class="${upDown(s.high - s.prev_close)}">${fmtP(s.high)}</td>
    <td class="${upDown(s.low - s.prev_close)}">${fmtP(s.low)}</td>
    <td class="pe">${((s.amount || 0) / 10000).toFixed(0)}</td>
    <td class="pe">${s.pe || '—'}</td>
  </tr>`).join('');

document.getElementById('updateTime').textContent = `数据更新时间: ${DATA.timestamp}`;
document.getElementById('tableUpdateTime').textContent = `最后更新: ${DATA.timestamp}`;

// ── Load live data from JSON (if available) ───────────────────────────────────
// 尝试加载 GitHub Actions 爬取的最新数据
fetch('data/pork-stocks.json')
  .then(r => r.json())
  .then(live => {
    if (live && live.timestamp !== DATA.timestamp) {
      location.reload(); // 有新数据时刷新页面
    }
  })
  .catch(() => {}); // 文件不存在则使用上方占位数据
</script>
</body>
</html>
