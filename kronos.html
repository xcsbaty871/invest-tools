<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronos 模型回测</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0b10;
    --card: #13141f;
    --border: #1e2130;
    --text: #e4e6f0;
    --dim: #6b7094;
    --accent: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --pink: #ec4899;
    --teal: #14b8a6;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    min-height: 100vh;
    padding: 20px 16px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .top-bar h1 {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .meta-tag {
    font-size: 12px; color: var(--dim);
    background: var(--card); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px;
  }

  /* Metrics Grid */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .metric-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    text-align: center;
  }
  .metric-label { font-size: 11px; color: var(--dim); margin-bottom: 6px; }
  .metric-val { font-size: 22px; font-weight: 700; }
  .metric-val.green { color: var(--green); }
  .metric-val.red { color: var(--red); }
  .metric-val.blue { color: var(--accent); }
  .metric-val.yellow { color: var(--yellow); }
  .metric-sub { font-size: 11px; color: var(--dim); margin-top: 3px; }

  /* Chart container */
  .section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
  }
  .section-title {
    font-size: 14px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap.tall { height: 340px; }

  /* Params row */
  .params {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .param-chip {
    font-size: 11px; padding: 4px 10px;
    background: rgba(99,102,241,0.1); color: var(--accent);
    border-radius: 6px; border: 1px solid rgba(99,102,241,0.2);
  }

  /* Signal timeline */
  .signals { display: flex; flex-direction: column; gap: 8px; }
  .signal-item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.02); border-radius: 10px;
    padding: 10px 14px; border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .signal-item:hover { border-color: var(--accent); }
  .signal-time { font-size: 12px; color: var(--dim); min-width: 130px; }
  .signal-badge {
    font-size: 12px; font-weight: 700; padding: 3px 10px;
    border-radius: 6px; min-width: 60px; text-align: center;
  }
  .badge-long { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-short { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-neutral { background: rgba(107,112,148,0.15); color: var(--dim); }
  .signal-conf { font-size: 12px; color: var(--dim); min-width: 50px; text-align: right; }
  .signal-reason { font-size: 12px; color: var(--dim); flex: 1; }
  .signal-price { font-size: 13px; font-weight: 600; min-width: 80px; text-align: right; }

  /* Trade table */
  .trade-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .trade-table th {
    text-align: left; padding: 8px 12px;
    color: var(--dim); font-size: 11px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .trade-table td {
    padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .trade-table tr:hover td { background: rgba(99,102,241,0.04); }
  .trade-id { color: var(--dim); }
  .pnl-pos { color: var(--green); font-weight: 600; }
  .pnl-neg { color: var(--red); font-weight: 600; }
  .trade-open { color: var(--yellow); font-size: 11px; }

  /* OHLC vs table */
  .ohlc-compare { overflow-x: auto; }
  .ohlc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ohlc-table th {
    padding: 8px 10px; color: var(--dim); font-size: 11px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .ohlc-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .ohlc-table tr:hover td { background: rgba(99,102,241,0.04); }
  .col-header { text-align: center; font-weight: 700; }
  .pred-col { color: var(--accent); }
  .act-col { color: var(--green); }
  .diff-neg { color: var(--green); }
  .diff-pos { color: var(--red); }

  /* Tab switcher */
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab {
    padding: 6px 16px; border-radius: 8px; font-size: 13px;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--dim);
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Legend */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px;
    font-size: 12px; color: var(--dim);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 20px; height: 3px; border-radius: 2px; }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .signal-item { flex-wrap: wrap; }
    .signal-reason { width: 100%; margin-top: 4px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Top -->
  <div class="top-bar">
    <div>
      <h1>📈 Kronos 模型回测</h1>
      <div style="font-size:13px;color:var(--dim);margin-top:4px">
        均值回归 + LLM 信号融合策略
      </div>
    </div>
    <div class="meta-tag" id="metaDate">—</div>
  </div>

  <!-- Params -->
  <div class="section">
    <div class="params" id="params"></div>
  </div>

  <!-- Key Metrics -->
  <div class="metrics" id="metrics"></div>

  <!-- Equity Curve -->
  <div class="section">
    <div class="section-title">📊 收益曲线</div>
    <div class="chart-wrap" id="equityChart"></div>
    <div class="legend" id="equityLegend"></div>
  </div>

  <!-- OHLC Comparison + Signals -->
  <div class="section">

    <div class="chart-wrap" id="ohlcChart"></div>
    <div class="legend" id="ohlcLegend"></div>
  </div>

  <!-- Tabs: Signals / Trades / Data -->
  <div class="section">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('signals')">交易信号</div>
      <div class="tab" onclick="switchTab('trades')">交易记录</div>
      <div class="tab" onclick="switchTab('ohlc-data')">预测数据</div>
    </div>

    <div class="tab-panel active" id="tab-signals">
      <div class="signals" id="signalsList"></div>
    </div>

    <div class="tab-panel" id="tab-trades">
      <table class="trade-table">
        <thead>
          <tr>
            <th>#</th><th>入场时间</th><th>方向</th>
            <th>入场价</th><th>出场价</th>
            <th>浮盈</th><th>持仓</th>
          </tr>
        </thead>
        <tbody id="tradesBody"></tbody>
      </table>
    </div>

    <div class="tab-panel" id="tab-ohlc-data">
      <div class="ohlc-compare">
        <table class="ohlc-table" id="ohlcTable"></table>
      </div>
    </div>
  </div>

</div>

        backgroundColor: '#1a1d27',
        borderColor: '#2a2d3a',
        borderWidth: 1,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString(undefined,{minimumFractionDigits:2})}`
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: { color: '#6b7094', font: { size: 10 }, maxTicksLimit: 10 }
      },
      y: {
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: { color: '#6b7094', font: { size: 11 },
          callback: v => v.toLocaleString() }
      }
    }
  }
});

document.getElementById('ohlcLegend').innerHTML = [
  {color:'#6366f1', text:'Kronos 预测收盘'},
  {color:'#22c55e', text:'实际收盘'},
].map(l => `<div class="legend-item"><div class="legend-line" style="background:${l.color}"></div>${l.text}</div>`).join('');

// ── Signals ────────────────────────────────────────────────────────────────────
document.getElementById('signalsList').innerHTML = DATA.signals.map(s => {
  const cls = s.signal === 'long' ? 'badge-long' : s.signal === 'short' ? 'badge-short' : 'badge-neutral';
  const label = s.signal === 'long' ? '多头' : s.signal === 'short' ? '空头' : '观望';
  return `
    <div class="signal-item">
      <div class="signal-time">${s.time.replace('T',' ').slice(0,16)}</div>
      <div class="signal-badge ${cls}">${label}</div>
      <div class="signal-conf">${(s.confidence*100).toFixed(0)}%</div>
      <div class="signal-price">${s.price.toLocaleString()}</div>
      <div class="signal-reason">${s.reason}</div>
    </div>`;
}).join('');

// ── Trades ─────────────────────────────────────────────────────────────────────
document.getElementById('tradesBody').innerHTML = DATA.trades.map(t => {
  const pnlCls = t.pnl > 0 ? 'pnl-pos' : t.pnl < 0 ? 'pnl-neg' : '';
  const pnlStr = t.pnl > 0 ? `+${t.pnl.toFixed(2)}` : t.pnl.toFixed(2);
  const sideCls = t.side === 'long' ? 'badge-long' : 'badge-short';
  const sideLabel = t.side === 'long' ? '多' : '空';
  const exitStr = t.exit_price === '' ? '<span class="trade-open">开仓中</span>' : t.exit_price.toLocaleString();
  return `
    <tr>
      <td class="trade-id">#${t.id}</td>
      <td>${t.entry.replace('T',' ').slice(0,16)}</td>
      <td><span class="signal-badge ${sideCls}">${sideLabel}</span></td>
      <td>${t.entry_price.toLocaleString()}</td>
      <td>${exitStr}</td>
      <td class="${pnlCls}">${pnlStr} (${t.pnl_pct > 0 ? '+' : ''}${t.pnl_pct}%)</td>
      <td>${t.holding}</td>
    </tr>`;
}).join('');

// ── OHLC Table ─────────────────────────────────────────────────────────────────
const tableRows = DATA.ohlcv.map((r, i) => {
  const diff = r.pred_c - r.act_c;
  const diffPct = ((diff / r.act_c) * 100).toFixed(2);
  const diffCls = diff < 0 ? 'diff-neg' : 'diff-pos';
  return `
    <tr>
      <td>${r.t.replace('T',' ').slice(0,16)}</td>
      <td class="pred-col">${r.pred_o.toFixed(2)}</td>
      <td class="pred-col">${r.pred_h.toFixed(2)}</td>
      <td class="pred-col">${r.pred_l.toFixed(2)}</td>
      <td class="pred-col">${r.pred_c.toFixed(2)}</td>
      <td class="act-col">${r.act_o.toFixed(2)}</td>
      <td class="act-col">${r.act_h.toFixed(2)}</td>
      <td class="act-col">${r.act_l.toFixed(2)}</td>
      <td class="act-col">${r.act_c.toFixed(2)}</td>
      <td class="${diffCls}">${diff > 0 ? '+' : ''}${diffPct}%</td>
    </tr>`;
}).join('');

document.getElementById('ohlcTable').innerHTML = `
  <thead>
    <tr>
      <th>时间</th>
      <th colspan="4" class="col-header pred-col">预测</th>
      <th colspan="4" class="col-header act-col">实际</th>
      <th>偏差</th>
    </tr>
    <tr>
      <th></th>
      <th>O</th><th>H</th><th>L</th><th>C</th>
      <th>O</th><th>H</th><th>L</th><th>C</th>
      <th></th>
    </tr>
  </thead>
  <tbody>${tableRows}</tbody>`;

// ── Tab Switcher ────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
</script>
</body>
</html>
