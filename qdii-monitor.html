<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e3ed;
    --text-dim: #7a7f9a;
    --accent: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --pink: #ec4899;
  }

  body {
    background: var(--bg);
    color: var(--text);

    min-height: 100vh;
    padding: 0;
  }

  /* ── Site Header ── */
  header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 52px; margin-bottom: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 15px; font-weight: 700; }
  .logo a { color: var(--accent); text-decoration: none; }
  .logo a:hover { opacity: 0.8; }
  .logo span { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: 6px; }
  nav { display: flex; gap: 4px; margin-left: auto; }
  nav a {
    color: var(--text-dim); text-decoration: none;
    padding: 5px 12px; border-radius: 6px; font-size: 13px;
    transition: background 0.15s;
  }
  nav a:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  nav a.active { color: var(--accent); }

  .header {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .refresh-time {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .dot.stale { background: var(--yellow); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .btn-refresh {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-refresh:hover { background: #5558e8; transform: scale(1.02); }
  .btn-refresh:active { transform: scale(0.98); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

  .tabs {
    max-width: 1200px;
    margin: 0 auto 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  .summary-bar {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .summary-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .summary-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .summary-card .value {
    font-size: 22px;
    font-weight: 700;
  }

  .summary-card .value.green { color: var(--green); }
  .summary-card .value.yellow { color: var(--yellow); }
  .summary-card .value.red { color: var(--red); }
  .summary-card .value.blue { color: var(--blue); }

  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(99,102,241,0.12);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 8px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
  }

  .card-code {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .limit-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .limit-badge.red-bg { background: rgba(239,68,68,0.15); color: var(--red); }
  .limit-badge.yellow-bg { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .limit-badge.green-bg { background: rgba(34,197,94,0.15); color: var(--green); }
  .limit-badge.blue-bg { background: rgba(59,130,246,0.15); color: var(--blue); }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .stat {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 8px 10px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 14px;
    font-weight: 600;
  }

  .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(99,102,241,0.12);
    color: var(--accent);
  }

  .tag.paused {

    color: var(--red);
  }

  .card.paused {
    opacity: 0.6;
    border-color: rgba(239,68,68,0.3);
  }

  .progress-bar {
    margin-top: 10px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .filter-row {
    max-width: 1200px;
    margin: 0 auto 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-select {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }

  .search-input {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    min-width: 160px;
    max-width: 300px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 14px;
    grid-column: 1 / -1;
  }

  .legend {
    max-width: 1200px;
    margin: 20px auto 0;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-dim);
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 16px; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

function formatScale(s) {
  if (s >= 100) return s.toFixed(1) + '亿';
  if (s >= 10) return s.toFixed(1) + '亿';
  if (s >= 1) return s.toFixed(2) + '亿';
  return s.toFixed(2) + '亿';
}

function getLimitColor(limit, status) {
  if (status === 'paused') return { bg: 'red-bg', text: '🔴 暂停', color: 'var(--red)' };
  if (limit >= 100) return { bg: 'green-bg', text: limit + '元/天', color: 'var(--green)' };
  if (limit === 50) return { bg: 'yellow-bg', text: '50元/天', color: 'var(--yellow)' };
  return { bg: 'blue-bg', text: '10元/天', color: 'var(--blue)' };
}

function getProgressWidth(limit, status) {
  if (status === 'paused') return 0;
  return Math.min(100, (limit / 500) * 100);
}

function getProgressColor(limit, status) {
  if (status === 'paused') return 'var(--red)';
  if (limit >= 100) return 'var(--green)';
  if (limit === 50) return 'var(--yellow)';
  return 'var(--blue)';
}

        <div class="stat">
          <div class="stat-label">近一年涨幅</div>
          <div class="stat-value" style="color:${retColor}">+${f.ret.toFixed(2)}%</div>
        </div>
        <div class="stat">
          <div class="stat-label">基金规模</div>
          <div class="stat-value">${formatScale(f.scale)}</div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progressW}%;background:${progressColor}"></div>
      </div>
      <div class="tag-row" style="margin-top:10px">
        <span class="tag" style="background:${typeColor}22;color:${typeColor}">${typeLabel}</span>
        ${f.status === 'paused' ? '<span class="tag paused">暂停申购</span>' : ''}
        ${f.limit === 10 ? '<span class="tag" style="background:rgba(234,179,8,0.12);color:var(--yellow)">⚠️ 限额极低</span>' : ''}
      </div>
    </div>
  `;
}

function renderSummary() {
  const nasdaq = rawData.filter(f => f.type === 'nasdaq');
  const sp = rawData.filter(f => f.type === 'sp500');
  const paused = rawData.filter(f => f.status === 'paused').length;
  const open = rawData.filter(f => f.status === 'open').length;
  const bestNasdaq = Math.max(...nasdaq.filter(f => f.status === 'open').map(f => f.limit));
  const bestSp = Math.max(...sp.filter(f => f.status === 'open').map(f => f.limit));

  const html = `
    <div class="summary-card">
      <div class="label">纳指100可申购</div>
      <div class="value green">${nasdaq.filter(f => f.status === 'open').length}只</div>
    </div>
    <div class="summary-card">
      <div class="label">标普500可申购</div>
      <div class="value blue">${sp.filter(f => f.status === 'open').length}只</div>
    </div>
    <div class="summary-card">
      <div class="label">全部暂停</div>
      <div class="value red">${paused}只</div>
    </div>
    <div class="summary-card">
      <div class="label">纳指最高限额</div>
      <div class="value green">${bestNasdaq}元</div>
    </div>
    <div class="summary-card">
      <div class="label">标普最高限额</div>
      <div class="value blue">${bestSp}元</div>
    </div>
  `;
  document.getElementById('summaryBar').innerHTML = html;
}

function applyFilters() {
  const tab = currentTab;
  const limitFilter = document.getElementById('filterLimit').value;
  const sort = document.getElementById('filterSort').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let list = [...rawData];

  // tab filter
  if (tab === 'nasdaq') list = list.filter(f => f.type === 'nasdaq');
  else if (tab === 'sp500') list = list.filter(f => f.type === 'sp500');

  // limit filter
  if (limitFilter === '500+') list = list.filter(f => f.limit >= 500);
  else if (limitFilter === '200+') list = list.filter(f => f.limit >= 200);
  else if (limitFilter === '100+') list = list.filter(f => f.limit >= 100);
  else if (limitFilter === '50+') list = list.filter(f => f.limit >= 50);
  else if (limitFilter === '10') list = list.filter(f => f.limit === 10);
  else if (limitFilter === 'paused') list = list.filter(f => f.status === 'paused');
  else if (limitFilter === 'open') list = list.filter(f => f.status === 'open');

  // search
  if (search) {
    list = list.filter(f => f.name.toLowerCase().includes(search) || f.code.includes(search));
  }

  // sort
  if (sort === 'limit-desc') list.sort((a, b) => b.limit - a.limit);
  else if (sort === 'limit-asc') list.sort((a, b) => a.limit - b.limit);
  else if (sort === 'return-desc') list.sort((a, b) => b.ret - a.ret);
  else if (sort === 'return-asc') list.sort((a, b) => a.ret - b.ret);
  else if (sort === 'scale-desc') list.sort((a, b) => b.scale - a.scale);

  filtered = list;

  const grid = document.getElementById('cardGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">没有找到符合条件的基金 🧐</div>';
  } else {
    grid.innerHTML = filtered.map(f => renderCard(f)).join('');
  }
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active',
      (tab === 'all' && i === 0) ||
      (tab === 'nasdaq' && i === 1) ||
      (tab === 'sp500' && i === 2));
  });
  applyFilters();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function refreshData() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.textContent = '⏳ 刷新中...';

  // 手动刷新：更新时间戳 + 提示去数据源核对
  // 由于跨域限制，无法从 feixia.org 自动拉取
  // 数据以最后一次手动更新为准
  await new Promise(r => setTimeout(r, 600)); // 假装加载一下

  const now = new Date();
  const timeStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');

  document.getElementById('refreshTime').textContent = '手动刷新: ' + timeStr;
  document.getElementById('statusDot').classList.remove('stale');
  showToast('✅ 已更新 ' + timeStr + '，数据源: feixia.org');

  btn.disabled = false;
  btn.textContent = '🔄 刷新数据';
}

// Init
renderSummary();
applyFilters();
document.getElementById('refreshTime').textContent = '数据来源: feixia.org (2026-05-06)';
</script>
</body>
</html>
